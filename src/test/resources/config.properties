# =============================================================
# Configurações do projeto de automação - Blog do Agi
# =============================================================
# Todas as propriedades podem ser sobrescritas via linha de comando:
# Exemplo: mvn test -Dbrowser=firefox -Dheadless=true
# =============================================================

# --- URL Base ---
# NOTA: https://blogdoagi.com.br/ redireciona para https://blog.agibank.com.br/
base.url=https://blog.agibank.com.br/

# --- Página interna usada para testar a busca ---
# A home page possui um bug de layout que impede o ícone de busca de aparecer.
# Os cenários de busca usam esta página interna onde o ícone funciona corretamente.
search.entry.page=emprestimos/

# --- Termos de busca ---
search.term.valid=emprestimo
search.term.no.results=xyzqwerty123456789

# --- Browser padrão (chrome | firefox | edge) ---
browser=chrome

# --- Modo headless (true | false) ---
# Use "true" em pipelines CI/CD
headless=false

# --- Timeouts (em segundos) ---
# IMPORTANTE: implicit=0 evita conflito com WebDriverWait (explicit wait)
timeout.implicit=0
timeout.explicit=15
timeout.page.load=30

# --- Janela do browser ---
window.maximize=true
